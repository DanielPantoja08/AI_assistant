services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logic_graph
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d logic_graph" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    env_file: .env
    environment:
      LG_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/logic_graph
      LG_CHROMA_DB_PATH: /app/chroma_db
      LG_OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_db
      - ./src:/app/src
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - app_net
    depends_on:
      - api
    restart: unless-stopped

networks:
  app_net:

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
